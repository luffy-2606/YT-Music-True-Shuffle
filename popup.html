<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Music True Shuffle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-icon {
      width: 26px; height: 26px;
      background: linear-gradient(135deg, #f03 0%, #aa0022 100%);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 14px; height: 14px; fill: #fff; }
    .header-name { font-size: 13px; font-weight: 700; color: #fff; }
    .header-ver  { font-size: 11px; color: rgba(255,255,255,0.3); margin-left: auto; }

    /* ── Body ── */
    #app { padding: 14px; }

    /* Empty state */
    .state-empty { text-align: center; padding: 20px 8px; color: rgba(255,255,255,0.45); }
    .state-empty .icon { font-size: 28px; margin-bottom: 10px; }

    /* Playlist info */
    .playlist-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: .08em;
      color: rgba(255,255,255,0.35); margin-bottom: 3px;
    }
    .playlist-title {
      font-size: 14px; font-weight: 600; color: #fff;
      margin-bottom: 14px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Action buttons */
    .btn-primary, .btn-secondary {
      display: flex; align-items: center; justify-content: center;
      gap: 7px; width: 100%; padding: 10px 16px;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s, opacity 0.15s;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #f03; color: #fff;
    }
    .btn-primary:hover    { background: #d4002a; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent; color: rgba(255,255,255,0.7);
      border: 1.5px solid rgba(255,255,255,0.18);
    }
    .btn-secondary:hover    { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.35); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-icon { font-size: 14px; }

    /* Backup info */
    .backup-row {
      display: flex; align-items: center; gap: 7px;
      margin-top: 4px; margin-bottom: 2px; flex-wrap: wrap;
    }
    .backup-badge {
      background: rgba(29,185,84,0.18); color: #1db954;
      padding: 2px 7px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .backup-meta { font-size: 11px; color: rgba(255,255,255,0.4); }
    .no-backup   { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }

    .error-msg {
      background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3);
      color: #ff8080; padding: 8px 10px; border-radius: 6px;
      font-size: 11.5px; line-height: 1.5; margin-top: 10px;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }

    .hint { font-size: 11px; color: rgba(255,255,255,0.32); line-height: 1.6; }

    /* ── Footer ── */
    .footer {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer a {
      font-size: 11px; color: rgba(255,255,255,0.28); text-decoration: none;
    }
    .footer a:hover { color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24">
        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
      </svg>
    </div>
    <span class="header-name">YT Music True Shuffle</span>
    <span class="header-ver">v1.0</span>
  </div>

  <div id="app">
    <div class="state-empty">
      <div class="icon">⏳</div>
      <p>Loading…</p>
    </div>
  </div>

  <div class="footer">
    <!--<a href="https://github.com" target="_blank">GitHub</a>-->
    <a href="#" id="clear-backups">Clear backups</a>
  </div>

  <script src="dist/popup.js"></script>
  <script>
    document.getElementById('clear-backups')?.addEventListener('click', async e => {
      e.preventDefault();
      if (!confirm('Delete all saved playlist backups?')) return;
      const all = await chrome.storage.local.get(null);
      const keys = Object.keys(all).filter(k => k.startsWith('ytms_backup_'));
      if (keys.length) {
        await chrome.storage.local.remove(keys);
        alert(`Cleared ${keys.length} backup(s).`);
      } else {
        alert('No backups to clear.');
      }
      location.reload();
    });
  </script>
</body>
</html>
